<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Devinettes de Rose 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #FF6B9D;
    --rose-light: #FFB3D1;
    --rose-dark: #E8457A;
    --cream: #FFF5F8;
    --dark: #2D1B25;
    --card: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BUBBLES BG ── */
  .bubbles {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,179,209,.35), rgba(255,107,157,.1));
    animation: floatBubble linear infinite;
  }
  @keyframes floatBubble {
    0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: .6; }
    100% { transform: translateY(-15vh) scale(1.1); opacity: 0; }
  }

  /* ── HOME SCREEN ── */
  #screen-home {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 20px; text-align: center;
  }
  .logo-wrap {
    font-size: 72px; margin-bottom: 6px;
    animation: logoBounce 2.5s ease-in-out infinite;
    filter: drop-shadow(0 6px 18px rgba(255,107,157,.45));
  }
  @keyframes logoBounce {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%     { transform: translateY(-10px) rotate(3deg); }
  }
  .app-title {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(2rem, 8vw, 3.4rem);
    font-weight: 900;
    color: var(--rose-dark);
    line-height: 1;
    text-shadow: 0 3px 0 rgba(255,107,157,.25);
    margin-bottom: 6px;
  }
  .app-sub {
    font-size: .95rem; color: #B06080; font-weight: 700; margin-bottom: 36px;
    letter-spacing: .3px;
  }
  .age-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    width: 100%; max-width: 380px; margin-bottom: 28px;
  }
  .age-btn {
    background: white;
    border: 2.5px solid rgba(255,107,157,.25);
    border-radius: 22px;
    padding: 22px 12px;
    cursor: pointer;
    transition: all .2s;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    box-shadow: 0 4px 18px rgba(255,107,157,.12);
  }
  .age-btn:hover, .age-btn:active {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--rose);
    box-shadow: 0 10px 30px rgba(255,107,157,.28);
  }
  .age-btn .big-emoji { font-size: 36px; }
  .age-btn .age-label {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem; font-weight: 900; color: var(--dark);
  }
  .age-btn .age-count { font-size: .72rem; color: #C090A8; font-weight: 700; }
  .hint { color: #D0A0B5; font-size: .78rem; font-weight: 600; }

  /* ── PLAYER SCREEN ── */
  #screen-player {
    display: none; flex-direction: column; min-height: 100vh;
    position: relative; z-index: 1; max-width: 480px; margin: 0 auto;
  }

  /* Header */
  .player-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: white;
    border-bottom: 2px solid rgba(255,107,157,.1);
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(255,107,157,.08);
  }
  .btn-back {
    background: var(--cream); border: 1.5px solid rgba(255,107,157,.25);
    border-radius: 10px; padding: 8px 14px; cursor: pointer;
    font-family: 'Nunito',sans-serif; font-weight: 700; font-size: .82rem; color: #B06080;
    transition: all .15s;
  }
  .btn-back:hover { background: rgba(255,107,157,.1); }
  .header-mid { display: flex; align-items: center; gap: 7px; }
  .header-emoji { font-size: 1.3rem; }
  .header-label { font-family:'Baloo 2',cursive; font-weight:800; font-size:.92rem; color:var(--dark); }
  .score-pill {
    background: rgba(255,107,157,.1); border: 1.5px solid rgba(255,107,157,.3);
    border-radius: 10px; padding: 7px 13px;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:.88rem; color:var(--rose-dark);
  }

  /* Category chips */
  .cat-row {
    display: flex; gap: 8px; padding: 10px 18px; overflow-x: auto; scrollbar-width: none;
    background: white; border-bottom: 1px solid rgba(255,107,157,.08);
  }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-chip {
    background: var(--cream); border: 1.5px solid rgba(255,107,157,.2);
    border-radius: 99px; padding: 5px 14px; cursor: pointer; white-space: nowrap;
    font-family:'Nunito',sans-serif; font-weight:700; font-size:.76rem; color:#B06080;
    transition: all .15s; flex-shrink: 0;
  }
  .cat-chip.active {
    background: var(--rose); border-color: var(--rose); color: white;
  }
  .cat-chip:hover:not(.active) { background: rgba(255,107,157,.1); }

  /* Progress */
  .progress-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 18px 4px;
    background: white;
  }
  .progress-bar-wrap { flex: 1; height: 5px; background: rgba(255,107,157,.12); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--rose-light), var(--rose)); border-radius: 99px; transition: width .4s ease; }
  .progress-text { font-size: .72rem; color: #C090A8; font-weight: 700; white-space: nowrap; }

  /* Card area */
  .card-area {
    flex: 1; display: flex; flex-direction: column;
    padding: 14px 18px 28px; gap: 14px;
    background: var(--cream);
  }

  /* Emoji */
  .q-emoji-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 4px; }
  .q-cat-pill {
    background: rgba(255,107,157,.12); border: 1px solid rgba(255,107,157,.25);
    border-radius: 99px; padding: 4px 14px;
    font-size: .7rem; font-weight: 800; color: var(--rose-dark); letter-spacing: .5px;
  }
  .q-emoji {
    font-size: 72px; line-height: 1;
    filter: drop-shadow(0 6px 18px rgba(255,107,157,.4));
    transition: transform .3s;
  }

  /* Question box */
  .q-box {
    background: white; border: 2px solid rgba(255,107,157,.15);
    border-radius: 22px; padding: 22px 20px; text-align: center;
    min-height: 90px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(255,107,157,.08);
  }
  .q-text { font-size: clamp(.95rem, 3.2vw, 1.15rem); font-weight: 700; color: var(--dark); line-height: 1.55; }
  .q-idle { font-size: 1rem; font-weight: 700; color: #D0A8BE; }

  /* Timer */
  .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .timer-svg { transform: rotate(-90deg); }
  .timer-text-wrap { position: relative; height: 0; display: flex; justify-content: center; }
  .timer-number {
    position: absolute; top: -54px;
    font-family:'Baloo 2',cursive; font-weight:900; font-size:1.9rem; color: var(--rose-dark);
    transition: color .3s;
  }
  .timer-label { font-size: .72rem; color: #C090A8; font-weight: 600; margin-top: 8px; }

  /* Dots loading */
  .dots-wrap { display: flex; justify-content: center; gap: 9px; padding: 12px 0; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--rose); animation: dotPop 1s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotPop { 0%,100%{transform:scale(.5);opacity:.3} 50%{transform:scale(1);opacity:1} }

  /* Answer box */
  .answer-box {
    background: linear-gradient(135deg, rgba(255,107,157,.1), rgba(255,179,209,.08));
    border: 2px solid rgba(255,107,157,.35);
    border-radius: 20px; padding: 20px; text-align: center;
    animation: revealPop .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes revealPop { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
  .answer-label { color: var(--rose); font-size: .7rem; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px; }
  .answer-text { color: var(--dark); font-size: clamp(1rem,3.5vw,1.3rem); font-weight: 900; line-height: 1.45; }
  .answer-bonus { margin-top: 10px; color: var(--rose-dark); font-weight: 700; font-size: .82rem; }

  /* Stats mini */
  .stats-mini { display: flex; justify-content: center; gap: 24px; }
  .stat-item { text-align: center; }
  .stat-val { font-family:'Baloo 2',cursive; font-weight:900; font-size:1.4rem; color:var(--rose-dark); }
  .stat-lbl { font-size:.7rem; color:#C090A8; font-weight:700; }
  .stat-divider { width:1px; background:rgba(255,107,157,.15); }

  /* Buttons */
  .spacer { flex: 1; }
  .btn-play {
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    border: none; border-radius: 18px; padding: 18px;
    color: white; font-family:'Baloo 2',cursive; font-weight:900; font-size:1.1rem;
    cursor: pointer; width: 100%;
    box-shadow: 0 8px 28px rgba(255,107,157,.45);
    transition: all .2s; letter-spacing: .3px;
  }
  .btn-play:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(255,107,157,.55); }
  .btn-play:active { transform: scale(.97); }

  .btn-row { display: flex; gap: 10px; }
  .btn-got {
    flex: 1; background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    border: none; border-radius: 15px; padding: 16px;
    color: white; font-family:'Baloo 2',cursive; font-weight:900; font-size:.95rem;
    cursor: pointer; box-shadow: 0 6px 20px rgba(255,107,157,.4); transition: all .2s;
  }
  .btn-got:hover { transform: translateY(-2px); }
  .btn-got:active { transform: scale(.96); }
  .btn-next-sm {
    background: white; border: 2px solid rgba(255,107,157,.25);
    border-radius: 15px; padding: 16px 20px;
    color: #C090A8; font-family:'Baloo 2',cursive; font-weight:800; font-size:1.1rem;
    cursor: pointer; transition: all .2s;
  }
  .btn-next-sm:hover { border-color: var(--rose); color: var(--rose); }
  .btn-next {
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    border: none; border-radius: 15px; padding: 16px; width: 100%;
    color: white; font-family:'Baloo 2',cursive; font-weight:900; font-size:.95rem;
    cursor: pointer; box-shadow: 0 6px 20px rgba(255,107,157,.4); transition: all .2s;
  }
  .btn-next:active { transform: scale(.97); }
  .btn-reveal {
    background: white; border: 2px solid rgba(255,107,157,.2);
    border-radius: 14px; padding: 13px; width: 100%;
    color: #C090A8; font-family:'Nunito',sans-serif; font-weight:700; font-size:.88rem;
    cursor: pointer; transition: all .2s;
  }
  .btn-reveal:hover { border-color: var(--rose); color: var(--rose); }

  /* Confetti burst */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall 1.8s ease-out forwards;
    opacity: 0;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(-10px) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(.5); }
  }

  /* Hidden utility */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Floating bubbles -->
<div class="bubbles" id="bubbles"></div>

<!-- ══════════════ HOME SCREEN ══════════════ -->
<div id="screen-home">
  <div class="logo-wrap">🌸</div>
  <h1 class="app-title">Les Devinettes<br>de Rose</h1>
  <p class="app-sub">Devinettes audio pour les enfants du Québec 🍁</p>

  <div class="age-grid" id="age-grid"></div>

  <p class="hint">🎧 Active le son pour entendre les devinettes</p>
</div>

<!-- ══════════════ PLAYER SCREEN ══════════════ -->
<div id="screen-player">
  <!-- Header -->
  <div class="player-header">
    <button class="btn-back" onclick="goHome()">← Retour</button>
    <div class="header-mid">
      <span class="header-emoji" id="hdr-emoji"></span>
      <span class="header-label" id="hdr-label"></span>
    </div>
    <div class="score-pill">⭐ <span id="score-display">0</span></div>
  </div>

  <!-- Categories -->
  <div class="cat-row" id="cat-row"></div>

  <!-- Progress -->
  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    <span class="progress-text" id="prog-text">1/1</span>
  </div>

  <!-- Card area -->
  <div class="card-area">
    <!-- Category pill + emoji -->
    <div class="q-emoji-wrap">
      <div class="q-cat-pill" id="q-cat">Animaux</div>
      <div class="q-emoji" id="q-emoji">🌸</div>
    </div>

    <!-- Question -->
    <div class="q-box">
      <p class="q-idle" id="q-idle">Appuie sur ▶ pour jouer !</p>
      <p class="q-text hidden" id="q-text"></p>
    </div>

    <!-- Timer (hidden by default) -->
    <div class="timer-wrap hidden" id="timer-wrap">
      <svg class="timer-svg" width="90" height="90">
        <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(255,107,157,.15)" stroke-width="6"/>
        <circle id="timer-ring" cx="45" cy="45" r="38" fill="none"
          stroke="#FF6B9D" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="238 238"
          style="transition:stroke-dasharray .9s linear,stroke .3s"/>
      </svg>
      <div class="timer-text-wrap">
        <span class="timer-number" id="timer-number">10</span>
      </div>
      <div class="timer-label" style="margin-top:50px">secondes pour réfléchir…</div>
    </div>

    <!-- Loading dots (hidden) -->
    <div class="dots-wrap hidden" id="dots-wrap">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <!-- Answer (hidden) -->
    <div class="answer-box hidden" id="answer-box">
      <div class="answer-label">✨ La réponse</div>
      <div class="answer-text" id="answer-text"></div>
      <div class="answer-bonus hidden" id="answer-bonus">+10 points ! 🎉</div>
    </div>

    <!-- Stats mini (hidden) -->
    <div class="stats-mini hidden" id="stats-mini">
      <div class="stat-item">
        <div class="stat-val" id="stat-right">0</div>
        <div class="stat-lbl">trouvées</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-val" id="stat-pts">0</div>
        <div class="stat-lbl">points</div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- Action buttons -->
    <div id="btn-area"></div>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-wrap hidden" id="confetti-wrap"></div>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentAge = "4-5";
let queue = [];
let idx = 0;
let phase = "idle"; // idle | intro | thinking | reveal
let timeLeft = 10;
let score = 0;
let sessionRight = 0;
let answered = false;
let timerInterval = null;
let catFilter = null;
const CIRCUM = 2 * Math.PI * 38;

const ENCOURS = [
  "Bravo champion ! T'es incroyable !",
  "Wow, super travail ! Continue !",
  "Tu es une vraie étoile !",
  "Fantastique ! Continue comme ça !",
  "Excellent ! T'es trop fort !",
  "Bravo ! Tu es brillant ou brillante !",
];

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function init() {
  // Build bubbles
  const bw = document.getElementById('bubbles');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 80 + 30;
    b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;
      animation-duration:${Math.random()*20+15}s;animation-delay:${Math.random()*15}s`;
    bw.appendChild(b);
  }
  // Build age buttons
  const grid = document.getElementById('age-grid');
  Object.entries(LIBRARY).forEach(([key, g]) => {
    const btn = document.createElement('button');
    btn.className = 'age-btn';
    btn.innerHTML = `<span class="big-emoji">${g.emoji}</span>
      <span class="age-label">${g.label}</span>
      <span class="age-count">${g.devinettes.length} devinettes</span>`;
    btn.onclick = () => startAge(key);
    grid.appendChild(btn);
  });
  // Load voices
  window.speechSynthesis && speechSynthesis.getVoices();
  window.speechSynthesis && speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function startAge(key) {
  currentAge = key;
  catFilter = null;
  score = 0; sessionRight = 0;
  buildQueue();
  showPlayer();
}

function goHome() {
  speechSynthesis.cancel();
  clearInterval(timerInterval);
  document.getElementById('screen-home').style.display = 'flex';
  document.getElementById('screen-player').style.display = 'none';
}

function showPlayer() {
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-player').style.display = 'flex';
  const g = LIBRARY[currentAge];
  document.getElementById('hdr-emoji').textContent = g.emoji;
  document.getElementById('hdr-label').textContent = g.label;
  buildCatChips();
  renderIdle();
}

// ══════════════════════════════════════════
//  QUEUE
// ══════════════════════════════════════════
function buildQueue() {
  let pool = [...LIBRARY[currentAge].devinettes];
  if (catFilter) pool = pool.filter(d => d.cat === catFilter);
  queue = pool.sort(() => Math.random() - 0.5);
  idx = 0; phase = "idle"; answered = false;
  renderIdle();
}

function buildCatChips() {
  const row = document.getElementById('cat-row');
  row.innerHTML = '';
  const cats = [...new Set(LIBRARY[currentAge].devinettes.map(d => d.cat))];
  const allBtn = makeChip('🎲 Tout', null);
  row.appendChild(allBtn);
  cats.forEach(c => row.appendChild(makeChip(c, c)));
}

function makeChip(label, val) {
  const btn = document.createElement('button');
  btn.className = 'cat-chip' + (catFilter === val ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    catFilter = val;
    speechSynthesis.cancel();
    clearInterval(timerInterval);
    buildQueue();
    document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  return btn;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderIdle() {
  phase = "idle";
  answered = false;
  const q = queue[idx];
  if (!q) return;
  // Update progress
  const pct = (idx / queue.length) * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${idx+1}/${queue.length}`;
  document.getElementById('score-display').textContent = score;
  // Emoji & cat
  document.getElementById('q-emoji').textContent = q.e;
  document.getElementById('q-cat').textContent = q.cat;
  // Show idle text
  show('q-idle'); hide('q-text');
  hide('timer-wrap'); hide('dots-wrap'); hide('answer-box'); hide('answer-bonus');
  // Stats
  if (score > 0) {
    show('stats-mini');
    document.getElementById('stat-right').textContent = sessionRight;
    document.getElementById('stat-pts').textContent = score;
  } else { hide('stats-mini'); }
  // Buttons
  document.getElementById('btn-area').innerHTML =
    `<button class="btn-play" onclick="startDevinette()">▶ Jouer la devinette</button>`;
}

function startDevinette() {
  const q = queue[idx];
  phase = "intro";
  answered = false;
  hide('q-idle'); show('q-text');
  document.getElementById('q-text').textContent = q.q;
  hide('timer-wrap'); hide('answer-box'); hide('stats-mini');
  show('dots-wrap');
  document.getElementById('btn-area').innerHTML = '';
  speak(`Devinette numéro ${idx+1}… ${q.q}`, () => {
    hide('dots-wrap');
    startTimer();
  });
}

function startTimer() {
  phase = "thinking";
  timeLeft = 10;
  show('timer-wrap');
  updateTimerUI();
  document.getElementById('btn-area').innerHTML =
    `<button class="btn-reveal" onclick="revealAnswer()">Afficher la réponse →</button>`;
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) { clearInterval(timerInterval); revealAnswer(); }
    else updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const pct = timeLeft / 10;
  const fill = pct * CIRCUM;
  const color = pct > 0.6 ? '#FF6B9D' : pct > 0.3 ? '#F7B731' : '#FC5C65';
  const ring = document.getElementById('timer-ring');
  ring.style.strokeDasharray = `${fill} ${CIRCUM}`;
  ring.style.stroke = color;
  document.getElementById('timer-number').textContent = timeLeft;
  document.getElementById('timer-number').style.color = color;
}

function revealAnswer() {
  clearInterval(timerInterval);
  phase = "reveal";
  const q = queue[idx];
  hide('timer-wrap');
  show('answer-box');
  document.getElementById('answer-text').textContent = q.r;
  hide('answer-bonus');
  document.getElementById('btn-area').innerHTML = `
    <div class="btn-row">
      <button class="btn-got" onclick="gotIt()">✅ J'avais trouvé ! +10</button>
      <button class="btn-next-sm" onclick="nextQ()">→</button>
    </div>`;
  speak(`La réponse est… ${q.r}. ${randEnc()}`);
}

function gotIt() {
  score += 10; sessionRight++;
  answered = true;
  document.getElementById('score-display').textContent = score;
  show('answer-bonus');
  document.getElementById('btn-area').innerHTML =
    `<button class="btn-next" onclick="nextQ()">Prochaine devinette →</button>`;
  confetti();
}

function nextQ() {
  clearInterval(timerInterval);
  speechSynthesis.cancel();
  idx++;
  if (idx >= queue.length) {
    idx = 0;
    queue = [...queue].sort(() => Math.random() - 0.5);
  }
  renderIdle();
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function randEnc() { return ENCOURS[Math.floor(Math.random() * ENCOURS.length)]; }

function speak(text, onEnd) {
  if (!window.speechSynthesis) { onEnd && onEnd(); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-CA'; u.rate = 0.87; u.pitch = 1.1;
  const voices = speechSynthesis.getVoices();
  const fr = voices.find(v => v.lang && v.lang.startsWith('fr'));
  if (fr) u.voice = fr;
  if (onEnd) u.onend = onEnd;
  // Fallback: some browsers delay onend
  if (onEnd) u.onerror = onEnd;
  speechSynthesis.speak(u);
  // Fallback timer if TTS not available
  if (!fr && onEnd) setTimeout(onEnd, text.length * 60 + 800);
}

function confetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  wrap.classList.remove('hidden');
  const colors = ['#FF6B9D','#FFB3D1','#F7B731','#26C99E','#7C6AF7','#FF9A3C'];
  for (let i = 0; i < 38; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:${-10 + Math.random()*20}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${Math.random()*10+5}px; height:${Math.random()*10+5}px;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration:${Math.random()*1.2+1.2}s;
      animation-delay:${Math.random()*0.4}s`;
    wrap.appendChild(p);
  }
  setTimeout(() => { wrap.innerHTML = ''; wrap.classList.add('hidden'); }, 2500);
}

// ══════════════════════════════════════════
//  START
// ══════════════════════════════════════════
init();
</script>
